server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA: unknown routes (including /?unlock=<TOKEN>) fall back to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # hashed build assets — cache hard
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
