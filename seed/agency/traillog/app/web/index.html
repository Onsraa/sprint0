<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrailLog — Live Delivery Tracking</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root { --bg:#0f1419; --panel:#1a2029; --line:#2a323d; --txt:#e6edf3; --muted:#8b98a5; --accent:#1f8feb; --green:#2ea043; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--txt); }
    #app { display: grid; grid-template-columns: 1fr 340px; height: 100%; }
    #map { height: 100%; }
    #side { background: var(--panel); border-left: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
    header { padding: 16px 18px; border-bottom: 1px solid var(--line); }
    header h1 { margin: 0; font-size: 18px; letter-spacing: .3px; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
    .eta { padding: 16px 18px; border-bottom: 1px solid var(--line); }
    .eta .big { font-size: 26px; font-weight: 700; }
    .eta .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; text-transform: uppercase; background: #243; color: var(--green); margin-left: 8px; vertical-align: middle; }
    .feed-head { padding: 12px 18px 6px; font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
    #feed { flex: 1; overflow-y: auto; padding: 0 12px 16px; }
    .note { background: #131922; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin: 8px 6px; animation: pop .3s ease; }
    .note .row { display: flex; justify-content: space-between; align-items: center; }
    .note .title { font-weight: 600; font-size: 14px; }
    .note .body { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .chan { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    .chan.push { background: #16324d; color: #6cb6ff; }
    .chan.sms { background: #3a2a16; color: #f0b86c; }
    .time { color: var(--muted); font-size: 11px; }
    .empty { color: var(--muted); font-size: 13px; padding: 12px 18px; }
    @keyframes pop { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>
    <aside id="side">
      <header>
        <h1>TrailLog <span id="status" class="status">live</span></h1>
        <p id="driver">Connecting to courier…</p>
      </header>
      <div class="eta">
        <div class="big" id="eta">Locating courier…</div>
        <div class="sub" id="next">—</div>
      </div>
      <div class="feed-head">Notification dispatcher</div>
      <div id="feed"><div class="empty">No notifications yet — they appear as the driver nears each stop.</div></div>
    </aside>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const ROUTE_ID = 1;
    const map = L.map("map", { zoomControl: true }).setView([37.79, -122.40], 14);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors",
    }).addTo(map);

    // Courier marker (a clear, labeled circle so it works with no icon assets).
    const driverIcon = L.divIcon({
      className: "",
      html: '<div style="background:#1f8feb;border:3px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 0 0 4px rgba(31,143,235,.35)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9],
    });
    let driverMarker = null;
    const trail = L.polyline([], { color: "#1f8feb", weight: 4, opacity: .9 }).addTo(map);
    const trailPts = [];

    // Draw the planned route + stops once we have the metadata.
    fetch("/api/route").then(r => r.json()).then(route => {
      document.getElementById("driver").textContent = "Driver: " + route.driver_name;
      const path = route.path.map(p => [p.lat, p.lng]);
      L.polyline(path, { color: "#3a4756", weight: 4, dashArray: "6 8" }).addTo(map);
      route.stops.forEach((s, i) => {
        L.marker([s.lat, s.lng], {
          icon: L.divIcon({
            className: "",
            html: `<div style="background:#2ea043;color:#fff;border:2px solid #fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font:700 12px sans-serif">${i + 1}</div>`,
            iconSize: [22, 22], iconAnchor: [11, 11],
          }),
        }).addTo(map).bindPopup(`<b>Stop ${i + 1}</b><br>${s.address}`);
      });
      if (path.length) map.fitBounds(path, { padding: [50, 50] });
    });

    function fmtEta(seconds) {
      if (seconds == null) return "Locating courier…";
      const mins = Math.max(1, Math.round(seconds / 60));
      return `Arriving in ~${mins} min`;
    }

    // --- Live position over websocket (poll fallback if WS drops) ---
    function onPosition(u) {
      const pt = [u.lat, u.lng];
      if (!driverMarker) driverMarker = L.marker(pt, { icon: driverIcon }).addTo(map).bindPopup("Courier");
      else driverMarker.setLatLng(pt);
      trailPts.push(pt);
      if (trailPts.length > 200) trailPts.shift();
      trail.setLatLngs(trailPts);
      document.getElementById("eta").textContent = fmtEta(u.eta_seconds);
      document.getElementById("next").textContent =
        u.next_stop_address ? `Next: ${u.next_stop_address}` : "All stops delivered";
    }

    function connectPositions() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/watch/${ROUTE_ID}`);
      ws.onmessage = e => onPosition(JSON.parse(e.data));
      ws.onclose = () => setTimeout(connectPositions, 1500);
    }
    connectPositions();

    // --- Notification dispatcher feed ---
    const feed = document.getElementById("feed");
    function addNote(n) {
      const empty = feed.querySelector(".empty");
      if (empty) empty.remove();
      const el = document.createElement("div");
      el.className = "note";
      el.innerHTML = `
        <div class="row"><span class="title">${n.title}</span><span class="chan ${n.channel}">${n.channel}</span></div>
        <div class="body">${n.body}</div>
        <div class="row" style="margin-top:6px"><span class="time">to ${n.recipient}</span><span class="time">${n.at}</span></div>`;
      feed.prepend(el);
    }
    function connectNotes() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws/notifications`);
      ws.onmessage = e => addNote(JSON.parse(e.data));
      ws.onclose = () => setTimeout(connectNotes, 1500);
    }
    // Seed with anything already sent before the page opened, then go live.
    fetch("/api/notifications").then(r => r.json()).then(list => {
      list.slice().reverse().forEach(addNote);
      connectNotes();
    });
  </script>
</body>
</html>
