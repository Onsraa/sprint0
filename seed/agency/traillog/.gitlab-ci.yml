# TrailLog pipeline — lint, test, build the image, deploy on tags
stages:
  - test
  - build
  - deploy

lint-and-test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install --no-cache-dir -r requirements.txt ruff pytest
    - ruff check app
    - pytest -q

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-prod:
  stage: deploy
  image: alpine:3.20
  script:
    - apk add --no-cache curl
    - curl -fsS -X POST "$DEPLOY_HOOK_URL" -H "X-Image:$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  rules:
    - if: $CI_COMMIT_TAG
  environment: production
